<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIB Admin — Login</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="../img/logo.png" alt="MIB Imóveis">
            <span class="login-badge">Painel Administrativo</span>
        </div>
        <h1>Acesso Restrito</h1>
        <p class="login-sub">Entre com suas credenciais de corretor</p>

        <div id="login-error" class="alert alert-error" style="display:none"></div>

        <form id="login-form">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" class="form-control-admin" placeholder="admin@mib.com.br" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" class="form-control-admin" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-admin btn-primary-admin" id="login-btn">
                Entrar no Painel
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
